<!-- ===========================================================
     AFFIRMER — Colours & Type (design tokens, import first)
     Anchored on Affirmer Blue #3385d9 · Brand typeface: Poppins
     =========================================================== -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

:root{
  /* Brand blue scale */
  --blue-50:#eef5fc; --blue-100:#d6e7f8; --blue-200:#aecff1; --blue-300:#7fb2e8;
  --blue-400:#5499e0; --blue-500:#3385d9; --blue-600:#2a6fb8; --blue-700:#225a97;
  --blue-800:#1b4677; --blue-900:#143356;
  /* Ink / cool-slate neutrals */
  --ink-900:#0f1b2a; --ink-800:#16263a; --ink-700:#2a3a4d; --ink-600:#475a6e;
  --ink-500:#6a7d92; --ink-400:#93a3b5; --ink-300:#c2cdda;
  --line:#e2e8f0; --line-strong:#cdd7e3;
  /* Surfaces */
  --surface:#ffffff; --surface-2:#f5f8fc; --surface-3:#eef4fb;
  /* WHS semantic signals */
  --safe:#1f9d57; --caution:#f5a623; --danger:#e0413a;
  /* Type */
  --font:'Poppins',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  /* Radii */
  --r-sm:10px; --r-md:14px; --r-lg:20px; --r-xl:28px; --r-pill:999px;
  /* Shadows (soft, cool-tinted) */
  --shadow-sm:0 2px 8px rgba(15,27,42,.07);
  --shadow-md:0 8px 24px rgba(15,27,42,.10);
  --shadow-lg:0 18px 48px rgba(15,27,42,.30);
  --shadow-blue:0 10px 28px rgba(51,133,217,.30);

  /* ---- Active theme: "Soft Blue" mood from the DeskFlex comp ---- */
  --accent:var(--blue-500);
  --accent-soft:#eef5fc;
  --accent-border:rgba(51,133,217,.20);
  --app-card:#ffffff;
  --ink:#0f1b2a;
  --muted:#475a6e;
  --card-line:#d6e7f8;
  --track:#dbe8f7;
  --ph-bg:#eef5fc;
  --ph-border:rgba(51,133,217,.20);
  --app-bg:linear-gradient(165deg,#eef5fc 0%,#d6e7f8 100%);
}

*{box-sizing:border-box}
[hidden]{display:none!important}
html,body{margin:0;padding:0}
body{
  font-family:var(--font); color:var(--ink);
  background:var(--app-bg); background-attachment:fixed;
  min-height:100vh; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  display:flex; flex-direction:column; align-items:center;
  padding:28px 16px max(28px,env(safe-area-inset-bottom));
}
button{font-family:var(--font)}
:focus-visible{outline:3px solid var(--accent); outline-offset:2px; border-radius:6px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:rgba(120,140,160,.3);border-radius:999px}

/* keyframes */
@keyframes dfPop{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:none}}
@keyframes dfFade{from{opacity:0}to{opacity:1}}
@keyframes dfPing{0%{transform:scale(.85);opacity:.55}70%{transform:scale(1.7);opacity:0}100%{opacity:0}}
@keyframes dfBreath{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes figNeck{0%,100%{transform:rotate(0)}25%{transform:rotate(15deg)}50%{transform:rotate(0)}75%{transform:rotate(-15deg)}}
@keyframes figRoll{0%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-4deg)}50%{transform:translateY(0)}75%{transform:translateY(-5px) rotate(4deg)}100%{transform:translateY(0)}}
@keyframes figTwist{0%,100%{transform:rotate(0)}25%{transform:rotate(14deg)}50%{transform:rotate(0)}75%{transform:rotate(-14deg)}}
@keyframes figFlex{0%,100%{transform:rotate(0)}30%{transform:rotate(-34deg)}62%{transform:rotate(30deg)}}
@keyframes figOpen{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.32)}}

/* ===================== Layout ===================== */
.app{width:min(468px,100%);display:flex;flex-direction:column;gap:18px}

/* Header */
.head{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:11px}
.brand img{display:block;width:30px;height:30px}
.brand .name{font-weight:700;font-size:22px;letter-spacing:-.02em;color:var(--ink-800);line-height:1.05}
.brand .tag{font-weight:500;font-size:11px;letter-spacing:.03em;color:var(--muted)}
.rem{display:flex;align-items:center;gap:9px;background:none;border:none;cursor:pointer;padding:6px 2px}
.rem .lbl{font-weight:600;font-size:12px;color:var(--muted)}
.switch{width:46px;height:27px;border-radius:var(--r-pill);padding:3px;display:flex;align-items:center;background:#cbd5e1;transition:background .2s ease}
.switch.on{background:var(--accent)}
.knob{width:21px;height:21px;border-radius:var(--r-pill);background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.25);transform:translateX(0);transition:transform .2s ease}
.switch.on .knob{transform:translateX(19px)}

/* Cards */
.card{background:var(--app-card);border:1px solid var(--card-line);box-shadow:var(--shadow-md)}
.timer{border-radius:var(--r-xl);padding:26px 24px 24px;text-align:center}
.sched{border-radius:var(--r-lg);padding:18px 20px}

/* Timer ring */
.ring-wrap{position:relative;width:236px;height:236px;margin:0 auto}
.ring-wrap svg{display:block;width:100%;height:100%}
.ring-bg{fill:none;stroke:var(--track);stroke-width:15}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:15;stroke-linecap:round;transition:stroke-dashoffset .9s linear}
.ring-mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
.time{font-weight:700;font-size:48px;letter-spacing:-.03em;color:var(--ink);font-variant-numeric:tabular-nums}
.cap{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--muted)}

/* Controls */
.controls{display:flex;gap:11px;margin-top:24px}
.btn{border:none;cursor:pointer;font-family:var(--font);font-weight:600;border-radius:var(--r-pill);transition:transform .12s ease,filter .15s ease,border-color .15s ease,color .15s ease}
.btn:active{transform:scale(.98)}
.btn-primary{flex:1;height:50px;background:var(--accent);color:#fff;font-size:16px;box-shadow:var(--shadow-blue)}
.btn-primary:hover{filter:brightness(.94)}
.btn-ghost{width:96px;height:50px;background:transparent;border:1px solid var(--card-line);color:var(--muted);font-size:15px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}

.enable{margin-top:14px;width:100%;display:flex;align-items:center;justify-content:center;gap:9px;height:44px;border:1px solid var(--ph-border);border-radius:var(--r-md);background:var(--ph-bg);color:var(--accent);font-weight:600;font-size:14px;cursor:pointer}
.enable:hover{filter:brightness(.97)}
.perm{margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;font-weight:500;font-size:12px;color:var(--muted)}
.perm .dot{width:7px;height:7px;border-radius:var(--r-pill);background:var(--caution)}

/* Scheduled breaks */
.sched-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:10px}
.eyebrow{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.14em;color:var(--accent)}
.next{font-weight:500;font-size:12px;color:var(--muted);text-align:right}
.chips{display:flex;gap:11px}
.chip{flex:1;display:flex;align-items:center;gap:10px;padding:12px 14px;border:1px solid var(--card-line);border-radius:var(--r-md)}
.chip svg{flex:0 0 auto}
.chip span{font-weight:600;font-size:15px;color:var(--ink)}

/* Stretch library */
.lib-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding:0 2px}
.lib-top h2{font-weight:600;font-size:16px;color:var(--ink);margin:0}
.try{display:flex;align-items:center;gap:6px;background:none;border:none;cursor:pointer;font-weight:600;font-size:13px;color:var(--accent);padding:4px 2px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.scard{text-align:left;background:var(--app-card);border:1px solid var(--card-line);border-radius:16px;padding:10px;cursor:pointer;display:flex;flex-direction:column;gap:9px;transition:transform .14s ease,box-shadow .14s ease,border-color .14s ease}
.scard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent)}
.thumb{height:74px;border-radius:11px;overflow:hidden;background:var(--ph-bg);display:flex;align-items:center;justify-content:center}
.scard .t-title{font-weight:600;font-size:14px;color:var(--ink);line-height:1.2}
.meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap}
.pill{font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--accent);background:var(--ph-bg);padding:2px 7px;border-radius:var(--r-pill)}
.dur{font-weight:500;font-size:11px;color:var(--muted)}

.foot{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:4px;text-align:center}
.foot img{height:20px;opacity:.92}
.foot .by{font-weight:500;font-size:11px;color:var(--muted);opacity:.85}

/* Animated demo figures */
.fig{width:100%;height:100%;display:block}
.fig .ln{fill:none;stroke:var(--accent);stroke-width:3.4;stroke-linecap:round;stroke-linejoin:round}
.fig .hd{fill:var(--accent-soft);stroke:var(--accent);stroke-width:3.4}
.fig .breath{animation:dfBreath 4s ease-in-out infinite;transform-origin:60px 80px}
.fig-neck .tilt{animation:figNeck 4.2s ease-in-out infinite;transform-origin:60px 74px}
.fig-shoulders .roll{animation:figRoll 3.2s ease-in-out infinite;transform-origin:60px 48px}
.fig-twist .twist{animation:figTwist 4.4s ease-in-out infinite;transform-origin:60px 84px}
.fig-wrist .flex{animation:figFlex 3.4s ease-in-out infinite;transform-origin:74px 58px}
.fig-chest .open{animation:figOpen 3.8s ease-in-out infinite;transform-origin:60px 50px}
.demo-gif{width:100%;height:100%;object-fit:contain;display:block}

/* Break modal */
.overlay{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(15,27,42,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.overlay.show{display:flex;animation:dfFade .3s ease}
.modal{position:relative;width:min(420px,100%);max-height:92vh;overflow:auto;background:var(--app-card);border-radius:var(--r-xl);padding:24px;box-shadow:var(--shadow-lg);animation:dfPop .45s cubic-bezier(.2,.8,.3,1)}
.m-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:8px}
.m-badge{display:flex;align-items:center;gap:9px;min-width:0}
.ping{position:relative;width:10px;height:10px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 auto}
.ping .a{position:absolute;width:10px;height:10px;border-radius:var(--r-pill);background:var(--accent);animation:dfPing 1.8s ease-out infinite}
.ping .b{width:8px;height:8px;border-radius:var(--r-pill);background:var(--accent)}
.m-badge .label{font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.16em;color:var(--accent);white-space:nowrap}
.m-badge .num{font-weight:500;font-size:11px;color:var(--muted);white-space:nowrap}
.x{width:32px;height:32px;border:none;border-radius:var(--r-pill);background:var(--ph-bg);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.x:hover{filter:brightness(.96)}
.demo{position:relative;border-radius:18px;overflow:hidden;background:var(--ph-bg);border:1px solid var(--ph-border);aspect-ratio:16/10;display:flex;align-items:center;justify-content:center}
.demo-cap{position:absolute;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;gap:7px;padding:7px;font-weight:500;font-size:11px;color:var(--muted);background:linear-gradient(transparent,rgba(255,255,255,.7))}
.m-title{margin:18px 0 4px;font-weight:700;font-size:24px;letter-spacing:-.02em;color:var(--ink)}
.m-sub{margin:0 0 16px;font-weight:400;font-size:14px;line-height:1.55;color:var(--muted)}
.steps{display:flex;flex-direction:column;gap:11px;margin:0;padding:0;list-style:none}
.step{display:flex;gap:12px;align-items:flex-start}
.step .n{flex:0 0 auto;width:26px;height:26px;border-radius:var(--r-pill);background:var(--ph-bg);color:var(--accent);font-weight:700;font-size:13px;display:flex;align-items:center;justify-content:center}
.step .tx{font-weight:400;font-size:14px;line-height:1.5;color:var(--ink);padding-top:3px}
.m-actions{display:flex;gap:11px;margin-top:22px}
.btn-done{flex:1;height:48px;background:var(--accent);color:#fff;font-size:15px;box-shadow:var(--shadow-blue);border:none;border-radius:var(--r-pill);font-weight:600;cursor:pointer}
.btn-done:hover{filter:brightness(.94)}
.btn-next{width:120px;height:48px;background:transparent;border:1px solid var(--card-line);border-radius:var(--r-pill);color:var(--ink);font-weight:600;font-size:14px;cursor:pointer}
.btn-next:hover{border-color:var(--accent);color:var(--accent)}

.visually-hidden{position:absolute;width:1px;height:1px;margin:-1px;padding:0;border:0;clip:rect(0 0 0 0);overflow:hidden}

@media (max-width:340px){
  .grid{grid-template-columns:1fr}
  .controls{flex-wrap:wrap}
  .btn-ghost{width:100%}
}
@media (prefers-reduced-motion:reduce){
  .fig *,.ping .a,.ring-fg,.btn{animation:none!important;transition:none!important}
}
</style>

<script>
(function(){
  "use strict";

  /* ---------- Animated demo figures (swappable for real GIFs) ---------- */
  var FIG = {
    neck:'<svg class="fig fig-neck" viewBox="0 0 120 100" aria-hidden="true"><g class="breath"><path class="ln" d="M28 80 Q60 73 92 80"/><g class="tilt"><line class="ln" x1="60" y1="74" x2="60" y2="58"/><circle class="hd" cx="60" cy="44" r="13"/></g></g></svg>',
    shoulders:'<svg class="fig fig-shoulders" viewBox="0 0 120 100" aria-hidden="true"><g class="breath"><circle class="hd" cx="60" cy="26" r="11"/><line class="ln" x1="60" y1="37" x2="60" y2="80"/><g class="roll"><path class="ln" d="M60 48 L40 56 L40 74"/><path class="ln" d="M60 48 L80 56 L80 74"/></g></g></svg>',
    twist:'<svg class="fig fig-twist" viewBox="0 0 120 100" aria-hidden="true"><g class="breath"><line class="ln" x1="40" y1="86" x2="80" y2="86"/><g class="twist"><circle class="hd" cx="60" cy="30" r="11"/><line class="ln" x1="60" y1="41" x2="60" y2="82"/><path class="ln" d="M60 53 L42 61"/><path class="ln" d="M60 53 L80 48"/></g></g></svg>',
    wrist:'<svg class="fig fig-wrist" viewBox="0 0 120 100" aria-hidden="true"><g class="breath"><line class="ln" x1="26" y1="58" x2="74" y2="58"/><g class="flex"><line class="ln" x1="74" y1="58" x2="93" y2="58"/><line class="ln" x1="93" y1="58" x2="99" y2="53"/></g><path class="ln" d="M48 58 q-7 -15 7 -19"/></g></svg>',
    chest:'<svg class="fig fig-chest" viewBox="0 0 120 100" aria-hidden="true"><g class="breath"><circle class="hd" cx="60" cy="28" r="11"/><line class="ln" x1="60" y1="39" x2="60" y2="80"/><g class="open"><path class="ln" d="M60 50 L42 62"/><path class="ln" d="M60 50 L78 62"/></g></g></svg>'
  };

  /* ---------- Stretch library (from the Affirmer DeskFlex comp) ---------- */
  var stretches = [
    { title:'Neck Release', area:'Neck', duration:'45 sec', move:'neck',
      subtitle:'Eases tension built up from looking down at screens.',
      steps:['Sit tall and let your shoulders drop and relax.','Tilt your right ear gently toward your right shoulder.','Hold for 15 seconds, breathing slowly, then return to centre.','Repeat on the left side.'] },
    { title:'Shoulder Rolls', area:'Shoulders', duration:'40 sec', move:'shoulders',
      subtitle:'Loosens stiff shoulders and improves upper-back posture.',
      steps:['Sit upright with your arms relaxed by your sides.','Roll both shoulders up, back, and down in a slow circle.','Complete 10 slow backward circles.','Reverse and do 10 forward circles.'] },
    { title:'Seated Spinal Twist', area:'Back', duration:'50 sec', move:'twist',
      subtitle:'Gently mobilises the spine and relieves lower-back stiffness.',
      steps:['Sit tall with both feet flat on the floor.','Place your right hand on your left knee.','Gently twist your torso to the left and hold 15 seconds.','Return to centre and repeat on the other side.'] },
    { title:'Wrist & Finger Stretch', area:'Wrists', duration:'40 sec', move:'wrist',
      subtitle:'Counters typing strain and keeps wrists comfortable.',
      steps:['Extend your right arm with the palm facing outward.','Use your other hand to gently pull the fingers back.','Hold 15 seconds, then point the fingers down and hold again.','Swap arms and repeat.'] },
    { title:'Chest Opener', area:'Chest', duration:'30 sec', move:'chest',
      subtitle:'Opens a hunched chest and resets your sitting posture.',
      steps:['Sit or stand tall and clasp your hands behind your back.','Straighten your arms and lift your hands slightly.','Squeeze your shoulder blades together to open the chest.','Hold for 20 seconds and breathe deeply.'] }
  ];

  /* ---------- State ---------- */
  var TOTAL = 120;                       // 2-minute timer
  var ringC = 2 * Math.PI * 130;         // ring circumference
  var times = [ {h:11,m:0,label:'11:00 AM'}, {h:15,m:0,label:'3:00 PM'} ];
  var fired = {};
  var st = { timeLeft:TOTAL, running:false, remindersOn:true, breakActive:false, preview:false, idx:0 };
  var perm = (typeof Notification !== 'undefined') ? Notification.permission : 'unsupported';
  var actx = null, lastFocus = null, titleFlash = null;

  /* ---------- Element refs ---------- */
  var $ = function(id){ return document.getElementById(id); };
  var els = {
    timeText:$('timeText'), cap:$('cap'), ringFg:$('ringFg'),
    startBtn:$('startBtn'), resetBtn:$('resetBtn'),
    enableBtn:$('enableBtn'), permDot:$('permDot'), permLabel:$('permLabel'),
    remToggle:$('remToggle'), remSwitch:$('remSwitch'), nextLine:$('nextLine'),
    tryBtn:$('tryBtn'), grid:$('grid'),
    overlay:$('overlay'), modal:$('modal'), mBadge:$('mBadge'), mNum:$('mNum'),
    demoArt:$('demoArt'), demoCap:$('demoCap'), mTitle:$('mTitle'), mSub:$('mSub'),
    steps:$('steps'), doneBtn:$('doneBtn'), nextBtn:$('nextBtn'), closeBtn:$('closeBtn')
  };

  /* ---------- Helpers ---------- */
  function fmt(s){ var m=Math.floor(s/60), ss=s%60; return ('0'+m).slice(-2)+':'+('0'+ss).slice(-2); }

  function nextBreakText(){
    var d=new Date();
    for(var i=0;i<times.length;i++){
      var c=new Date(d); c.setHours(times[i].h,times[i].m,0,0);
      if(c>d) return times[i].label+' today';
    }
    return times[0].label+' tomorrow';
  }

  /* ---------- Audio: gentle ascending chime (no external files) ---------- */
  function ensureAudio(){
    if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(actx && actx.state==='suspended'){ actx.resume(); }
    return actx;
  }
  function playChime(){
    var ctx=ensureAudio(); if(!ctx) return;
    var notes=[523.25,659.25,783.99];   // C5 E5 G5
    function pass(start){
      notes.forEach(function(f,i){
        var o=ctx.createOscillator(), g=ctx.createGain();
        o.type='sine'; o.frequency.value=f;
        var t=start+i*0.17;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.16,t+0.04);
        g.gain.exponentialRampToValueAtTime(0.0008,t+1.4);
        o.connect(g); g.connect(ctx.destination);
        o.start(t); o.stop(t+1.5);
      });
    }
    var now=ctx.currentTime; pass(now); pass(now+0.62);   // two passes = a touch louder / harder to miss
  }
  function buzz(){ if(navigator.vibrate){ try{ navigator.vibrate([120,80,120]); }catch(e){} } }

  /* ---------- Desktop notification ---------- */
  function notify(s){
    if(perm==='granted' && st.remindersOn && typeof Notification!=='undefined'){
      try{ new Notification('DeskFlex — Time to Move', { body:s.title+' · '+s.duration, tag:'deskflex' }); }catch(e){}
    }
  }
  function flashTitle(){
    if(!document.hidden) return;
    var base='DeskFlex — Desk break reminders by Affirmer', on=true;
    clearInterval(titleFlash);
    titleFlash=setInterval(function(){ document.title = on ? 'Time to move — DeskFlex' : base; on=!on; },900);
    var stop=function(){ clearInterval(titleFlash); document.title=base; document.removeEventListener('visibilitychange',stop); };
    document.addEventListener('visibilitychange',stop);
  }

  /* ---------- Renderers ---------- */
  function renderTimer(){
    els.timeText.textContent = fmt(st.timeLeft);
    els.ringFg.setAttribute('stroke-dasharray', ringC.toFixed(2));
    els.ringFg.setAttribute('stroke-dashoffset', (ringC*(1 - st.timeLeft/TOTAL)).toFixed(2));
    els.cap.textContent = st.running ? 'Stretch coming up' : '2-minute desk reset';
    els.startBtn.textContent = st.running ? 'Pause'
      : (st.timeLeft===TOTAL ? 'Start 2-min timer' : 'Resume');
  }

  function renderPerm(){
    var map = {
      granted:{label:'Desktop alerts are on', dot:'var(--accent)'},
      denied:{label:'Alerts blocked in browser settings', dot:'var(--danger)'},
      'default':{label:'Enable alerts to be reminded', dot:'var(--caution)'},
      unsupported:{label:'Desktop alerts not supported here', dot:'var(--ink-400)'}
    };
    var pm = map[perm] || map['default'];
    els.permLabel.textContent = pm.label;
    els.permDot.style.background = pm.dot;
    els.enableBtn.hidden = (perm!=='default');
  }

  function renderReminders(){
    els.remSwitch.classList.toggle('on', st.remindersOn);
    els.remToggle.setAttribute('aria-checked', String(st.remindersOn));
    els.remToggle.setAttribute('aria-label', st.remindersOn ? 'Pause scheduled reminders' : 'Resume scheduled reminders');
    els.nextLine.textContent = st.remindersOn ? ('Next · '+nextBreakText()) : 'Reminders paused';
  }

  function renderGrid(){
    var html='';
    for(var i=0;i<stretches.length;i++){
      var s=stretches[i];
      html += '<button class="scard" data-i="'+i+'">'
            +   '<div class="thumb">'+(s.gif?'<img class="demo-gif" src="'+s.gif+'" alt="">':FIG[s.move])+'</div>'
            +   '<div><div class="t-title">'+s.title+'</div>'
            +     '<div class="meta"><span class="pill">'+s.area+'</span><span class="dur">'+s.duration+'</span></div>'
            +   '</div>'
            + '</button>';
    }
    els.grid.innerHTML = html;
    Array.prototype.forEach.call(els.grid.querySelectorAll('.scard'), function(b){
      b.addEventListener('click', function(){ openStretch(parseInt(b.getAttribute('data-i'),10), true); });
    });
  }

  function renderModal(){
    var s=stretches[st.idx];
    els.mBadge.textContent = st.preview ? 'Preview' : 'Time to move';
    els.mNum.textContent = (st.idx+1)+' of '+stretches.length;
    els.demoArt.innerHTML = s.gif ? '<img class="demo-gif" src="'+s.gif+'" alt="Animated demonstration of '+s.title+'">' : FIG[s.move];
    els.demoCap.textContent = 'Animated guide · '+s.area+' · '+s.duration;
    els.mTitle.textContent = s.title;
    els.mSub.textContent = s.subtitle;
    var steps='';
    for(var i=0;i<s.steps.length;i++){
      steps += '<li class="step"><span class="n">'+(i+1)+'</span><span class="tx">'+s.steps[i]+'</span></li>';
    }
    els.steps.innerHTML = steps;
  }

  function renderOverlay(){
    els.overlay.classList.toggle('show', st.breakActive);
    els.overlay.setAttribute('aria-hidden', String(!st.breakActive));
    document.body.style.overflow = st.breakActive ? 'hidden' : '';
  }

  /* ---------- Actions ---------- */
  function openStretch(i, preview){
    st.idx=i; st.breakActive=true; st.preview=!!preview;
    renderModal(); renderOverlay();
    if(!preview){ playChime(); buzz(); notify(stretches[i]); flashTitle(); }
    lastFocus = document.activeElement;
    setTimeout(function(){ els.doneBtn.focus(); }, 60);
  }
  function randIdx(){ return Math.floor(Math.random()*stretches.length); }

  function toggleTimer(){
    st.running = !st.running;
    if(st.running){ ensureAudio(); if(st.timeLeft<=0) st.timeLeft=TOTAL; }
    renderTimer();
  }
  function resetTimer(){ st.running=false; st.timeLeft=TOTAL; renderTimer(); }
  function completeBreak(){
    st.breakActive=false; st.preview=false; renderOverlay();
    if(lastFocus && lastFocus.focus){ lastFocus.focus(); }
  }
  function nextStretch(){ st.idx=(st.idx+1)%stretches.length; renderModal(); }
  function toggleReminders(){ st.remindersOn=!st.remindersOn; renderReminders(); }
  function testAlert(){ ensureAudio(); openStretch(randIdx(), false); }

  function requestPermission(){
    if(typeof Notification==='undefined') return;
    Notification.requestPermission().then(function(p){
      perm=p; renderPerm();
      if(p==='granted'){ try{ new Notification('DeskFlex', {body:'Reminders are on — we\u2019ll nudge you to move.', tag:'deskflex'}); }catch(e){} }
    });
  }

  function checkSchedule(){
    if(!st.remindersOn) return;
    var d=new Date();
    for(var i=0;i<times.length;i++){
      var t=times[i];
      if(d.getHours()===t.h && d.getMinutes()===t.m){
        var k=d.toDateString()+'-'+t.h+':'+t.m;
        if(!fired[k]){ fired[k]=true; openStretch(randIdx(), false); }
      }
    }
  }

  /* ---------- Wire up ---------- */
  els.startBtn.addEventListener('click', toggleTimer);
  els.resetBtn.addEventListener('click', resetTimer);
  els.enableBtn.addEventListener('click', requestPermission);
  els.remToggle.addEventListener('click', toggleReminders);
  els.tryBtn.addEventListener('click', testAlert);
  els.doneBtn.addEventListener('click', completeBreak);
  els.closeBtn.addEventListener('click', completeBreak);
  els.nextBtn.addEventListener('click', nextStretch);
  els.overlay.addEventListener('click', function(e){ if(e.target===els.overlay) completeBreak(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape' && st.breakActive) completeBreak(); });

  /* ---------- Loops ---------- */
  setInterval(function(){
    if(!st.running) return;
    var t = st.timeLeft - 1;
    if(t<=0){ st.timeLeft=TOTAL; st.running=false; renderTimer(); openStretch(randIdx(), false); }
    else { st.timeLeft=t; renderTimer(); }
  }, 1000);
  setInterval(function(){ checkSchedule(); renderReminders(); }, 15000);

  /* ---------- First paint ---------- */
  renderGrid(); renderTimer(); renderPerm(); renderReminders(); renderModal();
})();
</script>
</body>
</html>
